name: Build and deploy AraBot Docker container to Azure

on:
  push:
    branches:
      - master
    paths:
      - 'bot_wa/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./bot_wa
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/arabot-wa:latest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_58AB46B38CD3400BA4E912B1E2298576 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_07FD4F2F5C5E4B708710DF818D7450D6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0B0355B9479046318CFD95D351CC21EF }}

      - name: Deploy container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'arabot-wa'
          images: 'ghcr.io/${{ github.repository_owner }}/arabot-wa:latest'
