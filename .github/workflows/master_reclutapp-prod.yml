# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - reclutapp-prod

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'bot_wa/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F7E3005BB6344B85A271EC97A11F70A6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_443BFAB4A7C64BBCA5100599DCB17EA8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E86BFFEBDBD24BC3A3359CCDE714E534 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'reclutapp-prod'
          slot-name: 'Production'
